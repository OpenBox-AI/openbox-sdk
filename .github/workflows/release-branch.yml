name: release branch

# Builds the SDK, then creates an immutable `release-v<tag>` branch
# carrying the same source plus committed `dist/` + `ts/*/dist/`
# artifacts. Strips the `prepare` script from the release-branch
# package.json so consumer installs don't rebuild from source.
#
# Consumers pin via:
#   "openbox-sdk": "github:OpenBox-AI/openbox-sdk#release-v0.2.0-alpha.1"
#
# A second branch `release-latest` is force-updated to track the most
# recent stable tag (alpha/beta/rc tags don't update it).
#
# Tags themselves stay on `main`; release branches are derivative.
#
# DISABLED on tag push until consumers test the new SDK and we're ready
# to ship. Re-enable by uncommenting the `push: tags:` trigger below.
# To run manually: GitHub Actions tab → release branch → Run workflow,
# pick the tag name in the `tag` input.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish a release branch for (e.g. v0.2.0-alpha.1)'
        required: true
        type: string
  # push:
  #   tags:
  #     - 'v*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        run: |
          # Tag-push event fills github.ref_name; manual dispatch supplies it via input.
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "value=${TAG}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.tag.outputs.value }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci --prefer-offline --no-audit --no-fund

      - run: npm run build

      - run: npm run test:unit

      - name: Create release branch
        env:
          TAG: ${{ steps.tag.outputs.value }}
        run: |
          BRANCH="release-${TAG}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          # Force-add dist artifacts that are gitignored on main.
          git add -f dist/ ts/*/dist/

          # Strip the prepare hook so consumer `npm install` doesn't
          # rebuild; they get the artifacts as-shipped.
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            delete p.scripts.prepare;
            delete p.scripts.prepublishOnly;
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "
          git add package.json

          git commit -m "release: $TAG (committed dist artifacts)"
          git push origin "$BRANCH"

      - name: Update release-latest (stable only)
        if: |
          !contains(steps.tag.outputs.value, '-alpha')
          && !contains(steps.tag.outputs.value, '-beta')
          && !contains(steps.tag.outputs.value, '-rc')
        env:
          TAG: ${{ steps.tag.outputs.value }}
        run: |
          git push -f origin "release-${TAG}:release-latest"
