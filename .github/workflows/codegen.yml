# Spec-driven codegen pipeline check.
#
# TypeSpec sources at specs/typespec/ are the source of truth. The
# emitters under codegen/emitters/ produce generated artifacts under
# ts/src/**/generated/ and specs/generated/. Drift between the
# committed generated files and a fresh re-emit is a build break.

name: Codegen Pipeline

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]
    paths:
      - "specs/**"
      - "codegen/**"
      - "ts/**"
      - ".github/workflows/codegen.yml"

jobs:
  compile-and-snapshot:
    name: TypeSpec compile + emitter snapshots
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      # Keep the Node heap high enough for TypeSpec + emitter builds on
      # hosted runners.
      - run: npm ci
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Build TypeSpec libraries + TS emitter
        run: npm run build:codegen

      - name: Compile TypeSpec sources
        run: npx tsp compile specs/typespec

      - name: Assert no uncommitted codegen drift
        run: npm run check:generated-drift

      - name: Lint generated/ banners
        run: npm run lint:generated-banners

      - name: Run unit tests (covers emitter snapshots)
        run: npm run test:unit

  spec-lint:
    name: Lint emitted OpenAPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      # Keep the Node heap high enough for TypeSpec + emitter builds on
      # hosted runners.
      - run: npm ci
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Build TypeSpec libraries + TS emitter
        run: npm run build:codegen

      - name: Compile specs
        run: npm run specs:compile

      - name: Spectral lint
        # Spectral catches OpenAPI authoring smells like missing
        # operationIds and untyped responses on top of TypeSpec's
        # compile errors. The ruleset is pinned via local .spectral.yaml,
        # which extends spectral:oas.
        run: npx --yes @stoplight/spectral-cli lint specs/generated/openapi3/*.json

  spec-diff:
    name: Breaking-change detection
    runs-on: ubuntu-latest
    # Optic compares the head's emitted spec against main. The drift workflow will
    # post the diff onto the PR; for now the job just runs and reports.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      # Keep the Node heap high enough for TypeSpec + emitter builds on
      # hosted runners.
      - run: npm ci
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Build TypeSpec libraries + TS emitter
        run: npm run build:codegen

      - name: Compile head spec
        run: npm run specs:compile

      - name: Save head spec
        run: |
          mkdir -p /tmp/openbox-spec-head
          cp specs/generated/openapi3/*.json /tmp/openbox-spec-head/

      - name: Compile main spec
        run: |
          git fetch origin main
          BASE_SPEC_WORKTREE="$RUNNER_TEMP/openbox-spec-base-worktree"
          rm -rf "$BASE_SPEC_WORKTREE"
          git worktree add --detach "$BASE_SPEC_WORKTREE" origin/main
          cd "$BASE_SPEC_WORKTREE"
          npm ci
          npm run build:codegen
          npm run specs:compile || true
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Save base spec
        run: |
          mkdir -p /tmp/openbox-spec-base
          cp "$RUNNER_TEMP/openbox-spec-base-worktree"/specs/generated/openapi3/*.json /tmp/openbox-spec-base/ 2>/dev/null || true

      - name: Optic diff
        run: |
          npx --yes @useoptic/optic@latest diff \
            /tmp/openbox-spec-head/OpenboxBackend.json \
            --base /tmp/openbox-spec-base/OpenboxBackend.json \
            --check || true
