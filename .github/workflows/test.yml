# Standard test gate.

name: Test

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: tsc + vitest
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: NODE_OPTIONS=--max-old-space-size=4096 npm ci
      - run: npm run specs:all
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run test:unit
      - run: npm run test:contract
      - run: npm run test:hook-integration

  build:
    name: tsup bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: NODE_OPTIONS=--max-old-space-size=4096 npm ci
      - run: npm run build
