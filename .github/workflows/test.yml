# Standard test gate.

name: Test

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: SDK checks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: python -m pip install uv==0.9.24
      - run: NODE_OPTIONS=--max-old-space-size=4096 npm ci
      - run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
      - run: npm run check:sdks
        env:
          UV_PYTHON: "3.11"

  build:
    name: tsup bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: NODE_OPTIONS=--max-old-space-size=4096 npm ci
      - run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
