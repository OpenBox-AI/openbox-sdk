version: 2
updates:
  # npm dependencies - root package.json plus the workspaces.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    versioning-strategy: increase
    groups:
      typespec:
        patterns:
          - '@typespec/*'
      vitest:
        patterns:
          - 'vitest'
          - '@vitest/*'

  # GitHub Actions versions.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
