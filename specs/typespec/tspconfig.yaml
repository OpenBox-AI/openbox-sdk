# TypeSpec compiler config; drives `npx tsp compile specs/typespec`.
#
# Two emitter outputs land under specs/generated/:
#   - openapi3/<service>.json  : re-emitted OpenAPI 3.x for each service
#   - json-schema/             : standalone JSON Schemas (used by the
#                                cross-language conformance fixtures)
#
# TypeSpec is the canonical OpenBox contract source. OpenAPI3,
# JSON Schema, SDK artifacts, and contract metadata maps are generated
# from these sources. Drift checks compare the emitted contracts against
# live/upstream services; generated artifacts are not hand-authored.

emit:
  - "@typespec/openapi3"
  - "@typespec/json-schema"
  - "typespec-emitter"

options:
  "@typespec/openapi3":
    emitter-output-dir: "{project-root}/../generated/openapi3"
    output-file: "{service-name}.json"
    file-type: "json"
  "@typespec/json-schema":
    emitter-output-dir: "{project-root}/../generated/json-schema"
  "typespec-emitter":
    # The emitter ignores its emitter-output-dir and writes directly
    # to ts/<package>/src/generated/. We still set it so the runtime
    # has a sane base path; the emitter walks back to repo root.
    emitter-output-dir: "{project-root}/../generated/ts-emit-anchor"
