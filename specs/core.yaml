openapi: "3.1.0"
info:
  title: OpenBox Core Governance API
  description: |
    The OpenBox Core governance engine API. This is the service that SDKs call
    for real-time governance evaluation and approval polling.

    Base URL: https://core.openbox.ai
  version: "1.0.0"

servers:
  - url: https://core.openbox.ai
    description: Production

paths:
  /:
    get:
      summary: Health check
      operationId: healthCheck
      tags: [Health]
      responses:
        "200":
          description: Service is healthy
          content:
            text/plain:
              schema:
                type: string
                example: "hello world"

  /api/v1/auth/validate:
    get:
      summary: Validate SDK API key
      operationId: validateApiKey
      tags: [Auth]
      security:
        - BearerApiKey: []
      responses:
        "200":
          description: API key is valid
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoreError"

  /api/v1/governance/evaluate:
    post:
      summary: Evaluate governance event
      description: |
        Core governance endpoint. Receives telemetry events from SDKs and returns
        a verdict (allow/constrain/require_approval/block/halt).

        Internally runs: token validation → session check → dedup → OPA policy →
        guardrails → AGE behavioral compliance → goal alignment → attestation.
      operationId: evaluateGovernance
      tags: [Governance]
      security:
        - BearerApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GovernanceEventPayload"
      responses:
        "200":
          description: Governance verdict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceVerdictResponse"
        "401":
          description: Invalid API key
        "408":
          description: Evaluation timeout (30s default)

  /api/v1/governance/approval:
    post:
      summary: Poll approval status
      description: |
        SDK polls this endpoint after receiving a REQUIRE_APPROVAL verdict.
        Returns the current approval status (pending/approved/rejected/expired).
      operationId: pollApproval
      tags: [Governance]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalPollRequest"
      responses:
        "200":
          description: Approval status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalPollResponse"

components:
  securitySchemes:
    BearerApiKey:
      type: http
      scheme: bearer
      description: "SDK API key in format obx_live_* or obx_test_*"

  schemas:
    CoreError:
      type: object
      properties:
        code:
          type: integer
          example: 401
        message:
          type: string
          example: "missing authorization token"

    GovernanceEventPayload:
      type: object
      required:
        - event_type
        - workflow_id
        - run_id
      properties:
        event_type:
          type: string
          enum:
            - WorkflowStarted
            - WorkflowCompleted
            - ActivityStarted
            - ActivityCompleted
            - LLMStarted
            - LLMCompleted
            - ToolStarted
            - ToolCompleted
            - SignalReceived
        workflow_id:
          type: string
        workflow_type:
          type: string
        run_id:
          type: string
        activity_id:
          type: string
        activity_type:
          type: string
        activity_input:
          oneOf:
            - type: array
            - type: object
        activity_output: {}
        source:
          type: string
          default: "workflow-telemetry"
        task_queue:
          type: string
          enum: [langgraph, temporal, mastra]
        timestamp:
          type: string
          format: date-time
        hook_trigger:
          type: boolean
          default: false
        goal:
          type: string
        span_count:
          type: integer
        spans:
          type: array
          items:
            $ref: "#/components/schemas/SpanObject"
        error:
          type: object
          properties:
            type:
              type: string
            message:
              type: string
        duration_ms:
          type: number
        attempt:
          type: integer
        __openbox:
          type: object
          properties:
            tool_type:
              type: string
            subagent_name:
              type: string

    SpanObject:
      type: object
      properties:
        name:
          type: string
        trace_id:
          type: string
        span_id:
          type: string
        parent_span_id:
          type: string
        kind:
          type: string
        start_time:
          type: integer
          description: Nanoseconds
        end_time:
          type: integer
        duration_ns:
          type: integer
        attributes:
          type: object
          properties:
            http.method:
              type: string
            http.url:
              type: string
            http.status_code:
              type: integer
            db.operation:
              type: string
            db.statement:
              type: string
            file.operation:
              type: string
            file.path:
              type: string
        request_headers:
          type: object
        response_headers:
          type: object
        request_body:
          type: string
        response_body:
          type: string
        status:
          type: object
          properties:
            code:
              type: string
            description:
              type: string
        events:
          type: array
          items:
            type: object

    GovernanceVerdictResponse:
      type: object
      properties:
        verdict:
          type: string
          enum: [ALLOW, CONSTRAIN, REQUIRE_APPROVAL, BLOCK, HALT]
        action:
          type: string
          enum: [allow, constrain, approval, block, halt]
        reason:
          type: string
        policy_id:
          type: string
        approval_id:
          type: string
        guardrails_result:
          type: object
          properties:
            validation_passed:
              type: boolean
            input_type:
              type: string
              enum: [activity_input, activity_output]
            redacted_input: {}
            reasons:
              type: array
              items:
                type: string
        age_result:
          type: object
          properties:
            fallback_used:
              type: boolean
            goal_alignment_checked:
              type: boolean
            goal_drifted:
              type: boolean

    ApprovalPollRequest:
      type: object
      required:
        - workflow_id
        - run_id
        - activity_id
      properties:
        workflow_id:
          type: string
        run_id:
          type: string
        activity_id:
          type: string

    ApprovalPollResponse:
      type: object
      properties:
        verdict:
          type: string
          enum: [ALLOW, BLOCK, REQUIRE_APPROVAL, HALT]
        action:
          type: string
        reason:
          type: string
        approval_expiration_time:
          type: string
          format: date-time
        expired:
          type: boolean
