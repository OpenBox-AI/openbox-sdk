[package]
name = "openbox-sdk"
version = "0.1.0"
edition = "2021"
description = "Rust SDK for OpenBox AI governance. Generated from the TypeSpec source of truth in this monorepo."
license = "MIT"
publish = false

# Layout mirrors `ts/src/`. Each package's `generated/` is owned by
# `typespec-emitter-rust`; everything else (the `request<R, B, Q>`
# transport in `client/mod.rs` + `core/mod.rs`, the token-store IO
# in `env/mod.rs`, the shared `ApiError` in `error.rs`) is hand-written
# platform glue. Re-emit the `generated/` trees with
# `npm run specs:compile` from the repo root.

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
tokio = { version = "1", features = ["macros", "rt"] }
thiserror = "1"
# Used by `approvals::format::{time_ago, time_remaining}` to parse the
# RFC-3339 timestamps the backend serializes on `Approval.created_at`
# / `Approval.approval_expired_at`. Default features (clock + std) are
# what the relative-time helpers need.
chrono = "0.4"
url = "2"
