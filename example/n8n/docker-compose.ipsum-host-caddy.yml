# Host-Caddy deployment for the OpenBox + n8n demo on the existing
# openbox-dev Hetzner host.
#
# This intentionally does not run Caddy in Docker. The host already owns
# :80/:443 with system Caddy. n8n is published only on 127.0.0.1 and should be
# exposed by a path route such as https://app.ipsum.lat/ob/n8n/.

volumes:
  n8n_storage:
  postgres_storage:

networks:
  internal:

services:
  postgres:
    image: postgres:16-alpine
    networks: [internal]
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.ipsum}
      POSTGRES_DB: ${POSTGRES_DB:-n8n}
    volumes:
      - postgres_storage:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-n8n} -d ${POSTGRES_DB:-n8n}']
      interval: 5s
      timeout: 3s
      retries: 20

  n8n-import:
    build:
      context: ../..
      dockerfile: example/n8n/custom-node/Dockerfile
    networks: [internal]
    user: root
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.ipsum}
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-n8n}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?set N8N_ENCRYPTION_KEY in .env.ipsum}
      N8N_USER_MANAGEMENT_JWT_SECRET: ${N8N_USER_MANAGEMENT_JWT_SECRET:?set N8N_USER_MANAGEMENT_JWT_SECRET in .env.ipsum}
      N8N_PATH: /ob/n8n/
    entrypoint: /bin/sh
    command:
      - -c
      - |
        DEST=/home/node/.n8n/custom/n8n-nodes-openbox-hook
        rm -rf "$$DEST"
        mkdir -p "$$DEST"
        cp -r /opt/custom-nodes/n8n-nodes-openbox-hook/. "$$DEST/"
        mkdir -p /home/node/.n8n/nodes/node_modules
        ln -sfn "$$DEST" /home/node/.n8n/nodes/node_modules/n8n-nodes-openbox-hook
        chown -R node:node /home/node/.n8n/custom /home/node/.n8n/nodes
        if [ -z "$$(N8N_LOG_LEVEL=error n8n list:workflow --onlyId 2>/dev/null)" ]; then
          n8n import:workflow --separate --input=/demo-data/workflows
        else
          echo "Workflows exist, skipping import"
        fi
    volumes:
      - n8n_storage:/home/node/.n8n
      - ./workflows:/demo-data/workflows:ro
    depends_on:
      postgres:
        condition: service_healthy

  n8n:
    build:
      context: ../..
      dockerfile: example/n8n/custom-node/Dockerfile
    networks: [internal]
    restart: unless-stopped
    ports:
      - '127.0.0.1:5678:5678'
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.ipsum}
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-n8n}
      N8N_HOST: ${N8N_HOST:-app.ipsum.lat}
      N8N_PROTOCOL: https
      N8N_PORT: 5678
      N8N_PATH: /ob/n8n/
      N8N_PROXY_HOPS: 1
      N8N_SECURE_COOKIE: 'true'
      N8N_EDITOR_BASE_URL: https://${N8N_HOST:-app.ipsum.lat}/ob/n8n/
      WEBHOOK_URL: https://${N8N_HOST:-app.ipsum.lat}/ob/n8n/
      N8N_DIAGNOSTICS_ENABLED: 'false'
      N8N_PERSONALIZATION_ENABLED: 'false'
      N8N_CUSTOM_EXTENSIONS: /home/node/.n8n/custom
      N8N_LOG_LEVEL: ${N8N_LOG_LEVEL:-info}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?set N8N_ENCRYPTION_KEY in .env.ipsum}
      N8N_USER_MANAGEMENT_JWT_SECRET: ${N8N_USER_MANAGEMENT_JWT_SECRET:?set N8N_USER_MANAGEMENT_JWT_SECRET in .env.ipsum}
      N8N_BLOCK_ENV_ACCESS_IN_NODE: 'false'
      N8N_RUNNERS_ENABLED: 'true'
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-liquid/lfm-2.5-1.2b-instruct:free}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENBOX_API_URL: ${OPENBOX_API_URL:?set OPENBOX_API_URL in .env.ipsum}
      OPENBOX_API_KEY: ${OPENBOX_API_KEY:?set OPENBOX_API_KEY in .env.ipsum}
      SLACK_CHANNEL_ID: ${SLACK_CHANNEL_ID:-}
      HUBSPOT_CRM_ENABLED: ${HUBSPOT_CRM_ENABLED:-false}
    volumes:
      - n8n_storage:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
      n8n-import:
        condition: service_completed_successfully
