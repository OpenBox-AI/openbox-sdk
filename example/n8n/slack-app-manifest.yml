_metadata:
  major_version: 2
  minor_version: 1

display_information:
  name: OpenBox Triage Agent
  description: OpenBox-governed support triage for n8n
  long_description: OpenBox Triage Agent sends Slack mentions into the n8n OpenBox Governed Support Triage workflow. The workflow checks the prompt, customer context, and outbound channel payloads before replying, then records planned-path and actual output status for chat, Slack, and optional CRM actions.
  background_color: "#0F172A"

features:
  bot_user:
    display_name: OpenBox Triage Agent
    always_online: true

oauth_config:
  scopes:
    bot:
      # Required by n8n Slack Trigger to list channels/users while configuring.
      - channels:read
      - groups:read
      - users:read

      # Required for the app_mention event used by this workflow.
      - app_mentions:read

      # Required by the Post to Slack node.
      - chat:write

      # Allows the bot to join a public channel if it has not been invited yet.
      - channels:join

      # Optional but useful for public-channel message context.
      - channels:history
      - groups:history

settings:
  event_subscriptions:
    request_url: https://app.ipsum.lat/ob/n8n/webhook/aaaaaaaa-bbbb-cccc-dddd-ffffffffffff/webhook
    bot_events:
      - app_mention
  interactivity:
    is_enabled: false
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
