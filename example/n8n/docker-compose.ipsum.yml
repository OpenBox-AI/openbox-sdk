# Standalone public hosting stack for the OpenBox + n8n demo on ipsum.lat.
#
# Usage from example/n8n:
#   cp .env.ipsum.example .env.ipsum
#   # edit .env.ipsum secrets/domain/channel IDs
#   docker compose --env-file .env.ipsum -f docker-compose.ipsum.yml up -d --build
#
# This stack does not require the local OpenBox Docker network. It expects
# OPENBOX_API_URL and OPENBOX_API_KEY to point at a reachable OpenBox Core.

volumes:
  caddy_data:
  caddy_config:
  n8n_storage:
  postgres_storage:
  ollama_storage:
  odoo_storage:
  odoo_postgres_storage:

networks:
  internal:

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    networks: [internal]
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp'
    environment:
      N8N_HOST: ${N8N_HOST:-app.ipsum.lat}
    volumes:
      - ./hosting/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      n8n:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    networks: [internal]
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.ipsum}
      POSTGRES_DB: ${POSTGRES_DB:-n8n}
    volumes:
      - postgres_storage:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-n8n} -d ${POSTGRES_DB:-n8n}']
      interval: 5s
      timeout: 3s
      retries: 20

  ollama:
    image: ollama/ollama:latest
    networks: [internal]
    restart: unless-stopped
    volumes:
      - ollama_storage:/root/.ollama
    healthcheck:
      test: ['CMD-SHELL', 'ollama list >/dev/null 2>&1 || exit 1']
      interval: 10s
      timeout: 3s
      retries: 30

  ollama-pull:
    image: ollama/ollama:latest
    networks: [internal]
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-tinyllama}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "[ollama-pull] pulling $$OLLAMA_MODEL via $$OLLAMA_HOST"
        ollama pull "$$OLLAMA_MODEL"
        echo "[ollama-pull] done"
    depends_on:
      ollama:
        condition: service_healthy
    restart: 'no'

  n8n-import:
    build:
      context: ../..
      dockerfile: example/n8n/custom-node/Dockerfile
    networks: [internal]
    user: root
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.ipsum}
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-n8n}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?set N8N_ENCRYPTION_KEY in .env.ipsum}
      N8N_USER_MANAGEMENT_JWT_SECRET: ${N8N_USER_MANAGEMENT_JWT_SECRET:?set N8N_USER_MANAGEMENT_JWT_SECRET in .env.ipsum}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        DEST=/home/node/.n8n/custom/n8n-nodes-openbox-hook
        rm -rf "$$DEST"
        mkdir -p "$$DEST"
        cp -r /opt/custom-nodes/n8n-nodes-openbox-hook/. "$$DEST/"
        mkdir -p /home/node/.n8n/nodes/node_modules
        ln -sfn "$$DEST" /home/node/.n8n/nodes/node_modules/n8n-nodes-openbox-hook
        chown -R node:node /home/node/.n8n/custom /home/node/.n8n/nodes
        if [ -z "$$(N8N_LOG_LEVEL=error n8n list:workflow --onlyId 2>/dev/null)" ]; then
          n8n import:workflow --separate --input=/demo-data/workflows
        else
          echo "Workflows exist, skipping import"
        fi
    volumes:
      - n8n_storage:/home/node/.n8n
      - ./workflows:/demo-data/workflows:ro
    depends_on:
      postgres:
        condition: service_healthy

  n8n:
    build:
      context: ../..
      dockerfile: example/n8n/custom-node/Dockerfile
    networks: [internal]
    restart: unless-stopped
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.ipsum}
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-n8n}
      N8N_HOST: ${N8N_HOST:-app.ipsum.lat}
      N8N_PROTOCOL: https
      N8N_PORT: 5678
      N8N_PROXY_HOPS: 1
      N8N_SECURE_COOKIE: 'true'
      N8N_EDITOR_BASE_URL: https://${N8N_HOST:-app.ipsum.lat}
      WEBHOOK_URL: https://${N8N_HOST:-app.ipsum.lat}/
      N8N_DIAGNOSTICS_ENABLED: 'false'
      N8N_PERSONALIZATION_ENABLED: 'false'
      N8N_CUSTOM_EXTENSIONS: /home/node/.n8n/custom
      N8N_LOG_LEVEL: ${N8N_LOG_LEVEL:-info}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?set N8N_ENCRYPTION_KEY in .env.ipsum}
      N8N_USER_MANAGEMENT_JWT_SECRET: ${N8N_USER_MANAGEMENT_JWT_SECRET:?set N8N_USER_MANAGEMENT_JWT_SECRET in .env.ipsum}
      N8N_BLOCK_ENV_ACCESS_IN_NODE: 'false'
      N8N_RUNNERS_ENABLED: 'true'
      OLLAMA_HOST: ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-tinyllama}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-liquid/lfm-2.5-1.2b-instruct:free}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENBOX_API_URL: ${OPENBOX_API_URL:?set OPENBOX_API_URL in .env.ipsum}
      OPENBOX_API_KEY: ${OPENBOX_API_KEY:?set OPENBOX_API_KEY in .env.ipsum}
      SLACK_CHANNEL_ID: ${SLACK_CHANNEL_ID:-}
    volumes:
      - n8n_storage:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
      n8n-import:
        condition: service_completed_successfully

  odoo-postgres:
    image: postgres:16-alpine
    profiles: ['odoo']
    networks: [internal]
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${ODOO_POSTGRES_USER:-odoo}
      POSTGRES_PASSWORD: ${ODOO_POSTGRES_PASSWORD:?set ODOO_POSTGRES_PASSWORD in .env.ipsum}
      POSTGRES_DB: ${ODOO_POSTGRES_DB:-postgres}
    volumes:
      - odoo_postgres_storage:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${ODOO_POSTGRES_USER:-odoo} -d ${ODOO_POSTGRES_DB:-postgres}']
      interval: 5s
      timeout: 3s
      retries: 20

  odoo:
    image: odoo:17
    profiles: ['odoo']
    networks: [internal]
    restart: unless-stopped
    environment:
      HOST: odoo-postgres
      USER: ${ODOO_POSTGRES_USER:-odoo}
      PASSWORD: ${ODOO_POSTGRES_PASSWORD:?set ODOO_POSTGRES_PASSWORD in .env.ipsum}
    volumes:
      - odoo_storage:/var/lib/odoo
    depends_on:
      odoo-postgres:
        condition: service_healthy
