# Local OpenBox + n8n integration playground.
#
# Prereq: from the openbox-sdk repo root, run `npm install && npm run build`
# once so the parent SDK package has a prebuilt `dist/` for the custom node's
# `file:../../..` dependency. Have your local OpenBox stack up so the
# `openbox-local_default` network exists. Then from this directory:
#
#   docker compose up --build
#
# That's it. No `.env` required for first run — the `seed` service
# bootstraps a default team + an agent in your local stack and writes the
# agent's runtime API key to a shared volume that n8n reads on startup.
#
# n8n: http://localhost:5678  (no login on first launch)
# Core: http://openbox-core-server:8086 (over the shared docker network)
# Ollama: in-stack at http://ollama:11434, model auto-pulled on first start

volumes:
  n8n_storage:
  postgres_storage:
  odoo_storage:
  odoo_postgres_storage:
  ollama_storage:
  openbox_seed:

networks:
  internal:
  openbox:
    name: openbox-local_default
    external: true

services:
  # -------------------------------------------------------------------------
  # Provisions the local OpenBox stack: resets the org admin password,
  # flips the api_keys feature flag, ensures a `default` team in keycloak
  # + postgres, mints an agent, and drops the runtime key into
  # openbox_seed:/seed/agent_key for n8n to consume. Idempotent.
  # -------------------------------------------------------------------------
  seed:
    build:
      context: ./seed
    networks: [openbox]
    restart: 'no'
    environment:
      KEYCLOAK_URL: http://openbox-keycloak:8080
      BACKEND_URL: http://openbox-backend:3000
      CORE_URL: http://openbox-core-server:8086
      PG_HOST: openbox-postgres
      PG_USER: ${PG_USER:-postgres}
      PG_PASSWORD: ${PG_PASSWORD:-password}
      PG_DB: openbox
      ORG_REALM: ${ORG_REALM:-openbox.local}
      ORG_ADMIN_EMAIL: ${ORG_ADMIN_EMAIL:-admin@openbox.local}
      AGENT_NAME: ${AGENT_NAME:-n8n-example}
      TEAM_NAME: ${TEAM_NAME:-default}
    volumes:
      - openbox_seed:/seed

  # Local demo implementation of the Guardrails API endpoint that Core already
  # calls at http://guardrails:8000. It supports the seeded ban-list guardrail
  # so the n8n example can demonstrate a visible block without requiring the
  # paid Guardrails AI build secret used by the full openbox-guardrails service.
  guardrails:
    build:
      context: ./guardrails-shim
    container_name: guardrails
    networks: [openbox]
    restart: unless-stopped
    environment:
      PGHOST: openbox-postgres
      PGPORT: 5432
      PGUSER: ${PG_USER:-postgres}
      PGPASSWORD: ${PG_PASSWORD:-password}
      PGDATABASE: openbox
    depends_on:
      seed:
        condition: service_completed_successfully

  postgres:
    image: postgres:16-alpine
    networks: [internal]
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-n8n}
      POSTGRES_DB: ${POSTGRES_DB:-n8n}
    volumes:
      - postgres_storage:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-n8n} -d ${POSTGRES_DB:-n8n}']
      interval: 5s
      timeout: 3s
      retries: 20

  odoo-postgres:
    image: postgres:16-alpine
    profiles: ['odoo']
    networks: [internal]
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${ODOO_POSTGRES_USER:-odoo}
      POSTGRES_PASSWORD: ${ODOO_POSTGRES_PASSWORD:-odoo}
      POSTGRES_DB: ${ODOO_POSTGRES_DB:-postgres}
    volumes:
      - odoo_postgres_storage:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${ODOO_POSTGRES_USER:-odoo} -d ${ODOO_POSTGRES_DB:-postgres}']
      interval: 5s
      timeout: 3s
      retries: 20

  odoo:
    image: odoo:17
    profiles: ['odoo']
    networks: [internal]
    restart: unless-stopped
    ports: ['8069:8069']
    environment:
      HOST: odoo-postgres
      USER: ${ODOO_POSTGRES_USER:-odoo}
      PASSWORD: ${ODOO_POSTGRES_PASSWORD:-odoo}
    volumes:
      - odoo_storage:/var/lib/odoo
    depends_on:
      odoo-postgres:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    networks: [internal]
    restart: unless-stopped
    volumes:
      - ollama_storage:/root/.ollama
    healthcheck:
      test: ['CMD-SHELL', 'ollama list >/dev/null 2>&1 || exit 1']
      interval: 10s
      timeout: 3s
      retries: 30

  ollama-pull:
    image: ollama/ollama:latest
    networks: [internal]
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-tinyllama}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "[ollama-pull] pulling $$OLLAMA_MODEL via $$OLLAMA_HOST"
        ollama pull "$$OLLAMA_MODEL"
        echo "[ollama-pull] done"
    depends_on:
      ollama:
        condition: service_healthy
    restart: 'no'

  n8n-import:
    build:
      context: ../..
      dockerfile: example/n8n/custom-node/Dockerfile
    networks: [internal]
    user: root
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-n8n}
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-n8n}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-example-only-encryption-key}
      N8N_USER_MANAGEMENT_JWT_SECRET: ${N8N_USER_MANAGEMENT_JWT_SECRET:-example-only-jwt-secret}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        DEST=/home/node/.n8n/custom/n8n-nodes-openbox-hook
        rm -rf "$$DEST"
        mkdir -p "$$DEST"
        cp -r /opt/custom-nodes/n8n-nodes-openbox-hook/. "$$DEST/"
        mkdir -p /home/node/.n8n/nodes/node_modules
        ln -sfn "$$DEST" /home/node/.n8n/nodes/node_modules/n8n-nodes-openbox-hook
        chown -R node:node /home/node/.n8n/custom /home/node/.n8n/nodes
        if [ -z "$$(N8N_LOG_LEVEL=error n8n list:workflow --onlyId 2>/dev/null)" ]; then
          n8n import:workflow --separate --input=/demo-data/workflows
        else
          echo "Workflows exist, skipping import"
        fi
    volumes:
      - n8n_storage:/home/node/.n8n
      - ./workflows:/demo-data/workflows
    depends_on:
      postgres:
        condition: service_healthy

  n8n:
    build:
      context: ../..
      dockerfile: example/n8n/custom-node/Dockerfile
    networks: [internal, openbox]
    restart: unless-stopped
    ports: ['5678:5678']
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-n8n}
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-n8n}
      N8N_DIAGNOSTICS_ENABLED: 'false'
      N8N_PERSONALIZATION_ENABLED: 'false'
      N8N_CUSTOM_EXTENSIONS: /home/node/.n8n/custom
      N8N_LOG_LEVEL: ${N8N_LOG_LEVEL:-info}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-example-only-encryption-key}
      N8N_USER_MANAGEMENT_JWT_SECRET: ${N8N_USER_MANAGEMENT_JWT_SECRET:-example-only-jwt-secret}
      N8N_BLOCK_ENV_ACCESS_IN_NODE: 'false'
      N8N_RUNNERS_ENABLED: 'true'
      OLLAMA_HOST: ${OLLAMA_HOST:-ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-tinyllama}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-liquid/lfm-2.5-1.2b-instruct:free}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENBOX_API_URL: ${OPENBOX_API_URL:-http://openbox-core-server:8086}
      SLACK_CHANNEL_ID: ${SLACK_CHANNEL_ID:-}
      HUBSPOT_CRM_ENABLED: ${HUBSPOT_CRM_ENABLED:-false}
      # If unset, the n8n entrypoint reads /seed/agent_key (written by the
      # `seed` service). Set explicitly to use a key from your dashboard.
      OPENBOX_API_KEY: ${OPENBOX_API_KEY:-}
    volumes:
      - n8n_storage:/home/node/.n8n
      - openbox_seed:/seed:ro
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
      n8n-import:
        condition: service_completed_successfully
      seed:
        condition: service_completed_successfully
      guardrails:
        condition: service_started
